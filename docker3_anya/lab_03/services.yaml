apiVersion: v1
kind: Service
metadata:
  name: influxdb-service
spec:
  selector:
    app: influxdb
    tier: storage
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: chronograf-service
spec:
  selector:
    app: chronograf
    tier: frontend
  type: NodePort
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
