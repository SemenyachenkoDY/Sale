apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb-db
spec:
  selector:
    matchLabels:
      app: influxdb
      tier: storage
  template:
    metadata:
      labels:
        app: influxdb
        tier: storage
    spec:
      containers:
      - name: influxdb
        image: influxdb:1.8
        env:
        - name: INFLUXDB_HTTP_AUTH_ENABLED
          value: "true"
        - name: INFLUXDB_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: INFLUXDB_ADMIN_USER
        - name: INFLUXDB_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: influxdb-auth
              key: INFLUXDB_ADMIN_PASSWORD
        ports:
        - containerPort: 8086
          name: influxdb
        resources:
          limits:
            memory: "512Mi"
            cpu: "250m"
